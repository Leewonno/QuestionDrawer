<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="질문서랍 Question Drawer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBF7F1"/>
      <stop offset="0.6" stop-color="#F4ECE0"/>
      <stop offset="1" stop-color="#EFE5D6"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0895F"/>
      <stop offset="1" stop-color="#D06A44"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.85">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#8a6b52" flood-opacity="0.22"/>
    </filter>
    <filter id="cardsh" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#9a8064" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="24" fill="url(#glow)"/>

  <!-- subtle dotted grid -->
  <g fill="#C79A76" opacity="0.14">
    <circle cx="60" cy="60" r="2.4"/><circle cx="120" cy="60" r="2.4"/><circle cx="180" cy="60" r="2.4"/>
    <circle cx="60" cy="120" r="2.4"/><circle cx="120" cy="120" r="2.4"/><circle cx="180" cy="120" r="2.4"/>
    <circle cx="60" cy="180" r="2.4"/><circle cx="120" cy="180" r="2.4"/>
  </g>

  <!-- left: text -->
  <g transform="translate(80, 132)">
    <!-- puzzle mark -->
    <g transform="translate(0,-58)">
      <rect x="0" y="0" width="46" height="46" rx="10" fill="url(#clay)"/>
      <circle cx="23" cy="6" r="7" fill="url(#clay)"/>
      <circle cx="40" cy="23" r="7" fill="url(#clay)"/>
      <rect x="14" y="14" width="18" height="18" rx="4" fill="#FBF7F1"/>
    </g>
    <text x="0" y="52" font-family="'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif" font-size="76" font-weight="800" fill="#2E2A26" letter-spacing="-1">질문서랍</text>
    <text x="4" y="96" font-family="'SF Mono','JetBrains Mono',monospace" font-size="26" font-weight="600" fill="#C15F3C" letter-spacing="4">QUESTION&#160;DRAWER</text>
    <text x="4" y="140" font-family="'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif" font-size="22" font-weight="500" fill="#7C7368">궁금한 부분을 드래그해 담아두면,</text>
    <text x="4" y="170" font-family="'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif" font-size="22" font-weight="500" fill="#7C7368">클릭 한 번으로 후속 질문을 꽂아주는 확장</text>
  </g>

  <!-- right: drawer illustration (matches real UI) -->
  <g transform="translate(720, 44)" filter="url(#soft)">
    <!-- drawer panel -->
    <rect x="0" y="0" width="400" height="312" rx="20" fill="#FDFBF7" stroke="#E7DDCD" stroke-width="1.5"/>
    <!-- drawer handle tab -->
    <rect x="-14" y="118" width="14" height="76" rx="6" fill="url(#clay)"/>

    <!-- header -->
    <g transform="translate(24,24)">
      <text x="0" y="14" font-family="'Pretendard','Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#2E2A26">질문서랍</text>
      <text x="0" y="38" font-family="'Pretendard','Segoe UI',sans-serif" font-size="11.5" font-weight="500" fill="#A69A8B">떠오른 질문 2개 · 클릭하면 바로 저장</text>
    </g>
    <line x1="24" y1="76" x2="376" y2="76" stroke="#EFE7D9" stroke-width="1"/>

    <!-- card 1: normal question -->
    <g transform="translate(24,92)" filter="url(#cardsh)">
      <rect x="0" y="0" width="352" height="58" rx="12" fill="#FFFFFF" stroke="#EAE1D2" stroke-width="1"/>
      <circle cx="26" cy="29" r="12" fill="#F3EADf"/>
      <text x="26" y="34" text-anchor="middle" font-family="'Pretendard','Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#B08A5E">?</text>
      <text x="50" y="34" font-family="'Pretendard','Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#3B352E">질문서랍에 대해 자세히 설명해줘</text>
    </g>

    <!-- card 2: highlighted (방금 담김) -->
    <g transform="translate(24,164)" filter="url(#cardsh)">
      <rect x="0" y="0" width="352" height="64" rx="12" fill="#FDF1E9" stroke="#E4915F" stroke-width="1.6"/>
      <text x="18" y="35" font-family="'Pretendard','Segoe UI',sans-serif" font-size="15" fill="#D06A44">✦</text>
      <text x="40" y="30" font-family="'Pretendard','Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#3B352E">취향에 대해 자세히 설명해줘</text>
      <!-- 방금 담김 pill -->
      <g transform="translate(40,42)">
        <rect x="0" y="0" width="66" height="18" rx="9" fill="url(#clay)"/>
        <text x="33" y="13" text-anchor="middle" font-family="'Pretendard','Segoe UI',sans-serif" font-size="10.5" font-weight="700" fill="#FFFFFF">방금 담김</text>
      </g>
    </g>

    <!-- footer hint -->
    <text x="200" y="262" text-anchor="middle" font-family="'Pretendard','Segoe UI',sans-serif" font-size="11" font-weight="500" fill="#B4A897">답변의 단어를 클릭하거나 직접 질문을 적어 담아두세요</text>
  </g>
</svg>
